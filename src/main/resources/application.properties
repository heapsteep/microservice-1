spring.application.name=microservice-1
server.port=8000

# Eureka changes:
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
#eureka.instance.instance-id=${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Tracing config:
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.correlation=[${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.include-application-name=false

spring.config.import=optional:configserver:http://localhost:8888
management.endpoints.web.exposure.include=refresh,health,env
greeting.message-suffix=response from microservice-1 (local fallback)
app.config-demo.environment=local